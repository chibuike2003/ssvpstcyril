<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Root Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --super-navy: #0f172a;
            --accent-gold: #f59e0b;
            --primary-blue: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; width: 100%; max-width: 450px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            padding: 40px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--super-navy); font-size: 24px; }
        .badge {
            background: rgba(245, 158, 11, 0.1); color: var(--accent-gold);
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; margin-bottom: 10px; display: inline-block;
        }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        input { padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        .btn-super {
            width: 100%; background: var(--super-navy); color: white;
            padding: 16px; border: none; border-radius: 8px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-super:hover { background: #1e293b; }
        .flash { padding: 10px; background: #fee2e2; color: #b91c1c; border-radius: 8px; margin-bottom: 20px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="header">
        <span class="badge">Security Gate</span>
        <h1>Root Access</h1>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('super_login_submit') }}" method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="root@enterprise.com" required>
        </div>
        <div class="form-group">
            <label>Master Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-super">Authorize Access</button>
    </form>
</div>

</body>
</html>
