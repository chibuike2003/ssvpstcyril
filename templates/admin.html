<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Create Account</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #dbeafe 100%);
            --glass-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .signup-container {
            background: var(--glass-bg);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: var(--text-main); margin-bottom: 8px; font-size: 32px; font-weight: 800; }
        .header p { color: #64748b; font-size: 15px; }

        /* Flash Messages Style */
        .flash-messages {
            margin-bottom: 20px;
            list-style: none;
            padding: 0;
        }
        .flash {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        .flash.error { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .flash.success { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }

        label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 12px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: white;
        }

        .btn-submit {
            grid-column: span 2;
            background-color: var(--primary-color);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background 0.2s;
        }

        .btn-submit:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }

        .footer-text { text-align: center; margin-top: 25px; font-size: 14px; color: #64748b; }
        .footer-text a { color: var(--primary-color); text-decoration: none; font-weight: 700; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width, .btn-submit { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="header">
        <h2>Admin Signup</h2>
        <p>Register as a President or Secretary to manage the portal.</p>
    </div>

    <form action="{{ url_for('admin_signup_submit') }}" method="POST">
        <div class="form-grid">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flash-messages">
          {% for category, message in messages %}
            <li class="flash {{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="Jane Smith" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="admin@example.com" required>
            </div>

            <div class="form-group">
                <label>Position Held</label>
                <select name="position" required>
                    <option value="" disabled selected>Choose Position</option>
                    <option value="president">President</option>
                    <option value="secretary">Secretary</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="0800 000 0000" required>
            </div>

            <div class="form-group">
                <label>Birthday</label>
                <input type="date" name="birthday" required>
            </div>

            <div class="form-group">
                <label>Relationship Status</label>
                <select name="relationship_status" required>
                    <option value="" disabled selected>Select Status</option>
                    <option value="single">Single</option>
                    <option value="married">Married</option>
                    <option value="divorced">Divorced</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>House Address</label>
                <input type="text" name="address" placeholder="Enter residential address" required>
            </div>

            <div class="form-group">
                <label>State of Origin</label>
                <input type="text" name="state" placeholder="Enter State" required>
            </div>

            <div class="form-group">
                <label>Local Government (LGA)</label>
                <input type="text" name="lga" placeholder="Enter LGA" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Register Admin</button>
        </div>
    </form>

    <div class="footer-text">
        Already registered? <a href="{{ url_for('login_page') }}">Login</a>
    </div>
</div>

</body>
</html>
