<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSVP | Admin Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --admin-dark: #1e293b;
            --admin-accent: #0f172a;
            --primary-blue: #2563eb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .login-card {
            background: white; width: 100%; max-width: 400px; padding: 40px;
            border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 40px; color: var(--admin-dark); margin-bottom: 10px; }
        .header h2 { margin: 0; color: var(--admin-dark); font-size: 24px; }
        
        .flash-messages { list-style: none; padding: 0; margin-bottom: 20px; }
        .flash { padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; }
        .error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
            box-sizing: border-box; transition: all 0.2s; font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn-admin {
            width: 100%; background: var(--admin-dark); color: white; padding: 14px;
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-admin:hover { background: var(--admin-accent); transform: translateY(-1px); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header">
            <i class="fas fa-user-shield"></i>
            <h2>Admin Portal</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login_submit') }}" method="POST">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" name="email" placeholder="admin@ssvp.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-admin">Secure Login</button>
        </form>
        
        <a href="{{ url_for('home') }}" class="back-link">Return to Home</a>
    </div>
</body>
</html>
